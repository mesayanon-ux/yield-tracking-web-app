<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Yield V4.8.5</title><script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script><style>
:root{--bg:#eef6fb;--card:#fff;--text:#142033;--muted:#64748b;--h1:#0d3b5c;--h2:#17618f;--btn:#1677b8;--stripe:#e9f3f8;--cum:#fff1a6;--low:#ffe600;--border:#233746}body[data-theme=green]{--bg:#f3f6f4;--h1:#1f4e3d;--h2:#2f6b55;--btn:#217346;--stripe:#e2f0d9}body[data-theme=slate]{--bg:#eef0f3;--h1:#273444;--h2:#3b4b5f;--btn:#475569;--stripe:#e5e7eb}body[data-theme=dark]{--bg:#111827;--card:#1f2937;--text:#f8fafc;--muted:#cbd5e1;--h1:#081a2b;--h2:#12324d;--btn:#3b82f6;--stripe:#273548;--border:#94a3b8;--cum:#6b4f00;--low:#a16207}*{box-sizing:border-box}body{margin:0;font:14px Arial;background:var(--bg);color:var(--text)}.w{max-width:1800px;margin:auto;padding:18px}.card{background:var(--card);padding:15px;margin:13px 0;border-radius:16px;box-shadow:0 8px 22px #0002}.top,.actions{display:flex;justify-content:space-between;align-items:end;gap:10px;flex-wrap:wrap}.tag{padding:7px 12px;border-radius:20px;background:#dbeafe;color:#1d4ed8;font-weight:bold}.drop{text-align:center;border:2px dashed #93c5fd;background:#eff6ff;color:#142033;padding:17px;border-radius:14px}.filters{display:grid;grid-template-columns:repeat(9,1fr);gap:8px}input,select,button{padding:9px;border:1px solid #cbd5e1;border-radius:10px;background:#fff;color:#142033}button{background:var(--btn);color:#fff;font-weight:bold;cursor:pointer}.ghost{background:#fff;color:var(--btn)}.ops{display:flex;gap:8px 14px;flex-wrap:wrap;margin-top:8px}.ops label{display:flex;gap:5px;align-items:center;font-weight:bold}.opbox{border:1px solid #cbd5e1;padding:11px;border-radius:12px;margin-top:10px}.muted{color:var(--muted);font-size:13px}.info{background:#dcfce7;color:#166534;padding:9px;border-radius:10px;margin-top:9px}.hide{display:none}.scroll{overflow:auto;max-height:76vh;border:1px solid var(--border)}table{border-collapse:collapse;width:100%;min-width:1400px;font-size:12px}th,td{border:1px solid var(--border);padding:4px 6px;text-align:right;white-space:nowrap}th{background:var(--h1);color:#fff;text-align:center}.level th{background:var(--h2)}.left{text-align:left}.sum:nth-child(even) td{background:var(--stripe)}.cum td{background:var(--cum);color:#111827;font-weight:bold}.opmain td{font-weight:bold}.ec-head td{background:#b9ff9b!important;color:#102a12;font-weight:bold}.ec-row td{background:var(--card)}.ec-row:nth-child(even) td{background:var(--stripe)}.ec-label{padding-left:18px!important}.ec-zero{color:var(--muted)}.low{background:var(--low)!important;color:#111827}.barwrap{height:10px;background:#dbe3ec;border-radius:8px;margin-top:8px;overflow:hidden}.bar{height:100%;width:0;background:var(--btn)}@media(max-width:1100px){.filters{grid-template-columns:1fr 1fr}}</style></head><body data-theme="ocean"><div class="w"><div class="top"><div><span class="tag">V4.8.5 EC Detail</span><h1>Yield Analysis Web App</h1><div class="muted">Decode → Group → Hierarchy Sort → Yield + EC Detail by Operation</div></div><button onclick="location.reload()">Reset</button></div>
<div class="card"><div class="drop"><h2>Upload CSV / XLSX</h2><input type="file" accept=".csv,.xlsx,.xls" onchange="loadFile(this.files[0])"><div class="barwrap"><div id="bar" class="bar"></div></div><div id="prog" class="muted">Waiting...</div></div><div id="info" class="info hide"></div></div>
<div class="card"><div class="filters"><label>Product<select id="product" onchange="render()"><option value="all">All</option></select></label><label>ชั้น 1<select id="l1" onchange="render()"></select></label><label>ชั้น 2<select id="l2" onchange="render()"></select></label><label>ชั้น 3<select id="l3" onchange="render()"></select></label><label>ชั้น 4<select id="l4" onchange="render()"></select></label><label>Highlight ต่ำกว่า<input id="target" type="number" value="98.5" step=".1" oninput="render()"></label><label>โทนสี<select id="theme" onchange="theme(this.value)"><option value="ocean">Ocean Blue</option><option value="green">Excel Green</option><option value="slate">Slate Gray</option><option value="dark">Night Dark</option></select></label><label>EC Detail<select id="showEC" onchange="render()"><option value="yes">แสดง</option><option value="no">ซ่อน</option></select></label><label>EC ต่อ Oper<input id="ecLimit" type="number" value="15" min="1" max="100" oninput="render()"></label></div><div class="muted" style="margin-top:8px">EC Detail จะแสดงใต้ Yield ของแต่ละ Operation โดย QTY = จำนวน EC และ % = EC QTY ÷ จำนวน Drive ที่เข้า Operation ในกลุ่มนั้น</div><div class="opbox"><div class="actions"><b>Operation</b><div><button class="ghost" onclick="pick('normal')">Oper ปกติ</button> <button class="ghost" onclick="pick('star')">*Oper</button> <button class="ghost" onclick="pick('all')">ทั้งหมด</button> <button class="ghost" onclick="pick('none')">ล้าง</button></div></div><div id="ops" class="ops"></div></div></div>
<div class="card"><div class="actions"><div><h2>Multi-Level Yield Pivot</h2><div id="path" class="muted"></div></div><button onclick="exportCSV()">Export CSV</button></div><div class="scroll"><table id="matrix"></table></div></div></div><script>
const ORDER=['SCOPY','PRE2','*PRE2','CAL','*CAL','CAL2','*CAL2','FNC2','*FNC2','SPSC2','*SPSC2','CRT2','*CRT2','PWT','*PWT'];
const MEDIA={'208956103':'SU2T','208956203':'SU28T','207373222':'SU3T','209130011':'SU3T_H','202180647':'SU38T','210392809':'SU4T','211372703':'SU28T ACR','210392825':'SU68T','210392803':'SU4T-H'};
const HSA={'211638612':'S8_NY85','211638613':'S8_NY85','211638614':'S78_NY85','211638615':'S78_NY85','211638616':'S8_NY85','211638617':'S8_NY85','211638618':'S78_NY85','211638619':'S78_NY85','211638600':'S8_NY82','211638601':'S8_NY82','211638602':'S78_NY82','211638603':'S78_NY82','211638604':'S8_NY82','211638605':'S8_NY82','211638606':'S78_NY82','211638607':'S78_NY82','208427067':'S78_NY80','208427068':'S78_NY80','208427069':'S78_NY75','208427070':'S78_NY75','208427071':'S78_NY75','208427072':'S78_NY80','208427051':'PureS8 NY75','211638626':'S78_602G-X1','211638627':'S78_602G-X1','208427050':'S8_NY75','208427006':'S34_SMR','208427007':'S34_SMR','208427078':'S4+1xS2'};
const F={none:{n:'None',a:[]},cms:{n:'CMS_CONFIG',a:['CMS_CONFIG']},hsa:{n:'HSA_PART_NUM',a:['HSA_PART_NUM','DRIVE_DIM_HSA_PART_NUM']},media:{n:'MEDIA_PART_NUM',a:['MEDIA_PART_NUM','DRIVE_DIM_MEDIA_PART_NUM']},preamp:{n:'PRE_AMP_VENDOR',a:['PRE_AMP_VENDOR']},fsa:{n:'FSA_SUPPLIER_0',a:['FSA_SUPPLIER_0']},drivePart:{n:'DRIVE_PART_NUM',a:['DRIVE_PART_NUM']},run:{n:'RUN_TYPE',a:['RUN_TYPE','BUILD_GROUP']},mediaType:{n:'MEDIA_TYPE',a:['MEDIA_TYPE']},mdw:{n:'MDW_ID',a:['MDW_ID']},hsaVendor:{n:'HSA_VENDOR',a:['HSA_VENDOR']}};
const C={product:['PRODUCT'],drive:['DRIVE_SERIAL_NUM'],sbr:['DRIVE_SBR_NUM','DEF_DRIVE_SBR_NUM'],fail:['FAIL_CODE','FAIL_DTL_FAIL_CODE'],op:['OPERATION','DEF_OPERATION'],date:['EVENT_DATE','DEF_ETL_LOAD_DATE']};let rows=[],head=[],ix={},scan=0;const $=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function index(){let all={...C};for(const k in F)if(k!=='none')all[k]=F[k].a;for(const k in all){ix[k]=-1;for(const n of all[k]){let i=head.findIndex(h=>String(h).trim().toUpperCase()===n);if(i>=0){ix[k]=i;break}}}}function val(r,k){return ix[k]>=0?String(r[ix[k]]??'').trim():''}function norm(x){let s=String(x??'').trim();return /^\d+\.0+$/.test(s)?s.replace(/\.0+$/,''):s}function ww(s){let m=String(s).toUpperCase().match(/^SM(\d{2})/);return m?m[1]:'Unknown'}function pass(x){return['','N/A','NA','NONE'].includes(String(x).trim().toUpperCase())}function time(x){let d=new Date(x);return isNaN(d)?0:+d}function decode(k,x){let s=norm(x);return k==='hsa'?(HSA[s]||s):k==='media'?(MEDIA[s]||s):(s||'Blank')}
function item(r,i){let o={product:val(r,'product')||'Blank',drive:val(r,'drive')||'ROW'+i,week:ww(val(r,'sbr')),op:val(r,'op')||'Blank',fail:val(r,'fail'),date:val(r,'date')};for(const k in F)if(k!=='none')o[k]=norm(val(r,k))||'Blank';return o}function parse(l){let a=[],x='',q=false;for(let i=0;i<l.length;i++){let c=l[i],n=l[i+1];if(q){if(c==='"'&&n==='"'){x+='"';i++}else if(c==='"')q=false;else x+=c}else if(c==='"')q=true;else if(c===','){a.push(x);x=''}else x+=c}a.push(x);return a}
async function loadFile(f){if(!f)return;rows=[];scan=0;if(/\.xlsx?$/i.test(f.name)){let b=await f.arrayBuffer(),wb=XLSX.read(b,{type:'array'}),a=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});head=a.shift().map(String);index();scan=a.length;rows=dedupe(a.map(item));finish(f)}else csv(f)}function csv(f){let size=4e6,off=0,rest='',first=true,a=[],rd=new FileReader();function next(){rd.onload=e=>{off+=size;let ls=(rest+e.target.result).split(/\r?\n/);rest=off>=f.size?'':ls.pop();for(const l of ls){if(!l)continue;let r=parse(l);if(first){head=r;index();first=false}else{scan++;a.push(item(r,scan))}}$('bar').style.width=Math.min(100,off/f.size*100)+'%';$('prog').textContent='Rows '+scan.toLocaleString();off<f.size?next():(rows=dedupe(a),finish(f))};rd.readAsText(f.slice(off,off+size))}next()}function dedupe(a){let m=new Map();for(const r of a){let k=r.drive+'|'+r.week+'|'+r.op,o=m.get(k);if(!o||time(r.date)>time(o.date))m.set(k,r)}return[...m.values()]}
function finish(f){$('bar').style.width='100%';$('info').classList.remove('hide');$('info').innerHTML='<b>Loaded:</b> '+esc(f.name)+' | Rows '+scan.toLocaleString()+' | Analysis '+rows.length.toLocaleString();fill();render()}function rank(x){let i=ORDER.indexOf(x);return i<0?999:i}function osort(a,b){return rank(a)-rank(b)||a.localeCompare(b)}function fill(){let ps=[...new Set(rows.map(r=>r.product))].sort(),os=[...new Set(rows.map(r=>r.op))].sort(osort);$('product').innerHTML='<option value="all">All</option>'+ps.map(x=>'<option>'+esc(x)+'</option>').join('');$('ops').innerHTML=os.map(x=>`<label><input class="op" type="checkbox" value="${esc(x)}" ${x.startsWith('*')?'':'checked'} onchange="render()">${esc(x)}</label>`).join('');let opts=Object.entries(F).map(([k,v])=>`<option value="${k}">${v.n}</option>`).join('');['l1','l2','l3','l4'].forEach(id=>$(id).innerHTML=opts);$('l1').value='cms';$('l2').value='hsa';$('l3').value='media';$('l4').value='none'}function pick(m){document.querySelectorAll('.op').forEach(c=>c.checked=m==='all'||(m==='normal'&&!c.value.startsWith('*'))||(m==='star'&&c.value.startsWith('*')));render()}function chosen(){return[...document.querySelectorAll('.op:checked')].map(c=>c.value).sort(osort)}function stats(a){let p=a.filter(r=>pass(r.fail)).length,d=a.length;return{p,d,y:d?p/d*100:null}}function q(x){return x?x.toLocaleString():'---'}function pc(x){return x==null?'---':x.toFixed(1)}function theme(v){document.body.dataset.theme=v;localStorage.setItem('theme',v)}
function compareGroup(a,b){let d=String(a.week).localeCompare(String(b.week),undefined,{numeric:true});if(d)return d;for(let i=0;i<a.values.length;i++){d=String(a.values[i]).localeCompare(String(b.values[i]),undefined,{numeric:true,sensitivity:'base'});if(d)return d}return 0}
function render(){
 let ops=chosen(),levels=['l1','l2','l3','l4'].map(id=>$(id).value).filter(k=>k!=='none'),base=rows.filter(r=>($('product').value==='all'||r.product===$('product').value)&&ops.includes(r.op)),map=new Map();
 for(const r of base){let values=levels.map(k=>decode(k,r[k])),key=r.week+'\u001e'+values.join('\u001f');if(!map.has(key))map.set(key,{week:r.week,values,rows:[]});map.get(key).rows.push(r)}
 let groups=[...map.values()].sort(compareGroup);$('path').textContent='WW → '+levels.map(k=>F[k].n).join(' → ')+' | Decode + Group + Hierarchical Sort + EC Detail';
 if(!groups.length){$('matrix').innerHTML='<tr><td>ไม่พบข้อมูล</td></tr>';return}
 let h='',sp=[{name:'WW',get:g=>'WW'+g.week},...levels.map((k,i)=>({name:F[k].n,get:g=>g.values[i]}))];
 for(let si=0;si<sp.length;si++){let layer=sp[si],cells=[],i=0;while(i<groups.length){let v=layer.get(groups[i]),n=1;while(i+n<groups.length&&layer.get(groups[i+n])===v&&sp.slice(0,si).every(p=>p.get(groups[i+n])===p.get(groups[i])))n++;cells.push(`<th colspan="${n*2}">${esc(v)}</th>`);i+=n}h+=`<tr class="level"><th class="left">${esc(layer.name)}</th>${cells.join('')}</tr>`}
 h+='<tr><th class="left">OPERATION / EC</th>'+groups.map(()=>'<th>QTY</th><th>%</th>').join('')+'</tr>';
 let b='',cum=groups.map(()=>1),showEC=$('showEC').value==='yes',limit=Math.max(1,+$('ecLimit').value||15);
 for(const op of ops){
   b+=`<tr class="sum opmain"><td class="left">${esc(op)}</td>`+groups.map((g,i)=>{let st=stats(g.rows.filter(r=>r.op===op));if(st.y!=null)cum[i]*=st.y/100;return`<td>${q(st.d)}</td><td class="${st.y!=null&&st.y<+$('target').value?'low':''}">${pc(st.y)}</td>`}).join('')+'</tr>';
   if(showEC){
     let allOp=base.filter(r=>r.op===op),failRows=allOp.filter(r=>!pass(r.fail)),codeMap=new Map();
     for(const r of failRows){let code=String(r.fail||'Blank').trim()||'Blank';codeMap.set(code,(codeMap.get(code)||0)+1)}
     let codes=[...codeMap.entries()].sort((a,b)=>b[1]-a[1]||String(a[0]).localeCompare(String(b[0]),undefined,{numeric:true})).slice(0,limit);
     if(codes.length){
       b+=`<tr class="ec-head"><td class="left">${esc(op)} — EC DETAIL</td>${groups.map(()=>'<td>---</td><td>---</td>').join('')}</tr>`;
       for(const [code] of codes){
         b+=`<tr class="ec-row"><td class="left ec-label">${esc(op)} — ${esc(code)}</td>`+groups.map(g=>{let parent=g.rows.filter(r=>r.op===op),count=parent.filter(r=>!pass(r.fail)&&(String(r.fail||'Blank').trim()||'Blank')===code).length,pct=parent.length?count/parent.length*100:null;return`<td class="${count?'':'ec-zero'}">${q(count)}</td><td class="${count?'':'ec-zero'}">${count?pc(pct):'---'}</td>`}).join('')+'</tr>';
       }
     }
   }
 }
 let last=ops.at(-1);b+=`<tr class="cum"><td class="left">CUM YIELD</td>`+groups.map((g,i)=>{let st=stats(g.rows.filter(r=>r.op===last));return`<td>${q(st.p)}</td><td>${pc(cum[i]*100)}</td>`}).join('')+'</tr>';
 $('matrix').innerHTML=h+b
}
function exportCSV(){let x=[...$('matrix').rows].map(r=>[...r.cells].map(c=>'"'+c.innerText.replaceAll('"','""')+'"').join(',')).join('\n'),a=document.createElement('a');a.href=URL.createObjectURL(new Blob([x],{type:'text/csv'}));a.download='yield_v4_8_5_ec_detail.csv';a.click()}let saved=localStorage.getItem('theme')||'ocean';document.body.dataset.theme=saved;window.addEventListener('DOMContentLoaded',()=>{$('theme').value=saved});</script></body></html>
