<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Yield Analysis V4.8.3</title><script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script><style>
:root{--bg:#f4f7fb;--card:#fff;--text:#142033;--muted:#64748b;--head:#123a5a;--head2:#1b527c;--border:#263746;--button:#2563eb;--cum:#fff4a8;--low:#fff200;--row:#fff;--stripe:#eef3f7}
body[data-theme="ocean"]{--bg:#eef6fb;--head:#0d3b5c;--head2:#165b87;--button:#1677b8;--cum:#fff1a6;--low:#ffe600;--stripe:#e9f3f8}
body[data-theme="excel"]{--bg:#f3f5f4;--head:#1f4e3d;--head2:#2f6b55;--button:#217346;--cum:#fff2cc;--low:#fff200;--stripe:#e2f0d9}
body[data-theme="slate"]{--bg:#eef0f3;--head:#273444;--head2:#3b4b5f;--button:#475569;--cum:#fde68a;--low:#facc15;--stripe:#e5e7eb}
body[data-theme="night"]{--bg:#111827;--card:#1f2937;--text:#f8fafc;--muted:#cbd5e1;--head:#081a2b;--head2:#12324d;--border:#94a3b8;--button:#3b82f6;--cum:#6b4f00;--low:#a16207;--row:#1f2937;--stripe:#273548}
*{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}.wrap{max-width:1800px;margin:auto;padding:18px}.card{background:var(--card);border-radius:16px;padding:15px;margin:13px 0;box-shadow:0 8px 22px #00000014}.top,.actions{display:flex;justify-content:space-between;gap:10px;align-items:end;flex-wrap:wrap}.tag{background:#dbeafe;color:#1d4ed8;padding:7px 12px;border-radius:20px;font-weight:700}h1{margin:8px 0}.drop{text-align:center;padding:16px;border:2px dashed #93c5fd;background:#eff6ff;color:#142033;border-radius:14px}.filters{display:grid;grid-template-columns:repeat(7,minmax(130px,1fr));gap:9px}input,select,button{padding:9px;border:1px solid #cbd5e1;border-radius:10px;background:#fff;color:#142033}button{background:var(--button);color:#fff;font-weight:700;cursor:pointer}.ghost{background:#fff;color:var(--button)}.opbox{border:1px solid #cbd5e1;border-radius:12px;padding:11px;margin-top:11px}.ops{display:flex;gap:8px 14px;flex-wrap:wrap;margin-top:9px}.ops label{display:flex;align-items:center;gap:5px;font-weight:600}.ops input{width:auto}.muted{font-size:13px;color:var(--muted)}.info{background:#dcfce7;color:#166534;padding:9px;border-radius:10px;margin-top:9px}.warn{background:#ffedd5;color:#9a3412;padding:9px;border-radius:10px;margin-top:9px}.hide{display:none}.progress{height:10px;background:#dbe3ec;border-radius:9px;overflow:hidden;margin-top:9px}.bar{height:100%;background:var(--button);width:0}.scroll{overflow:auto;max-height:76vh;border:1px solid var(--border)}table{border-collapse:collapse;min-width:1400px;width:100%;font-size:12px}th,td{border:1px solid var(--border);padding:4px 6px;text-align:right;white-space:nowrap}th{background:var(--head);color:#fff;text-align:center}.level th{background:var(--head2)}.left{text-align:left}.sum:nth-child(even) td{background:var(--stripe)}.sum td{background:var(--row)}.cum td{background:var(--cum);color:#111827;font-weight:700}.low{background:var(--low)!important;color:#111827}.legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:8px}.dot{display:inline-block;width:12px;height:12px;border:1px solid #555;margin-right:4px;vertical-align:-1px}@media(max-width:1100px){.filters{grid-template-columns:1fr 1fr}}
</style></head><body data-theme="ocean"><div class="wrap"><div class="top"><div><span class="tag">V4.8.3 Group by Decode + Theme</span><h1>Yield Analysis Web App</h1><div class="muted">Decode ก่อน Group: รหัสหลายตัวที่ Decode เป็นชื่อเดียวกันจะถูกรวมเป็นคอลัมน์เดียว</div></div><button onclick="location.reload()">Reset</button></div>
<div class="card"><div class="drop"><h2>Upload CSV / XLSX</h2><input type="file" accept=".csv,.xlsx,.xls" onchange="loadFile(this.files[0])"><div class="progress"><div id="bar" class="bar"></div></div><div id="prog" class="muted">Waiting...</div></div><div id="info" class="info hide"></div><div id="warn" class="warn hide"></div></div>
<div class="card"><div class="filters"><label>Product<select id="product" onchange="render()"><option value="all">All</option></select></label><label>ชั้นที่ 1<select id="lv1" onchange="render()"></select></label><label>ชั้นที่ 2<select id="lv2" onchange="render()"></select></label><label>ชั้นที่ 3<select id="lv3" onchange="render()"></select></label><label>ชั้นที่ 4<select id="lv4" onchange="render()"></select></label><label>Highlight ต่ำกว่า %<input id="target" type="number" value="98.5" step=".1" oninput="render()"></label><label>โทนสี<select id="theme" onchange="setTheme(this.value)"><option value="ocean">Ocean Blue</option><option value="excel">Excel Green</option><option value="slate">Slate Gray</option><option value="night">Night Dark</option></select></label></div><div class="opbox"><div class="actions"><b>Operation</b><div><button class="ghost" onclick="pick('normal')">Oper ปกติ</button> <button class="ghost" onclick="pick('star')">*Oper</button> <button class="ghost" onclick="pick('all')">ทั้งหมด</button> <button class="ghost" onclick="pick('none')">ล้าง</button></div></div><div id="ops" class="ops"></div></div><div class="legend"><span><i class="dot" style="background:var(--low)"></i>ต่ำกว่า Target</span><span><i class="dot" style="background:var(--cum)"></i>CUM Yield</span><span class="muted">ค่า Decode ที่เหมือนกันจะถูกรวมก่อนคำนวณ QTY/Yield</span></div></div>
<div class="card"><div class="actions"><div><h2>Multi-Level Yield Pivot</h2><div id="path" class="muted"></div></div><button onclick="exportCSV()">Export CSV</button></div><div class="scroll"><table id="matrix"></table></div></div></div>
<script>
const ORDER=['SCOPY','PRE2','*PRE2','CAL','*CAL','CAL2','*CAL2','FNC2','*FNC2','SPSC2','*SPSC2','CRT2','*CRT2','PWT','*PWT'];
const MEDIA_DECODE={'208956103':'SU2T','208956203':'SU28T','207373222':'SU3T','209130011':'SU3T_H','202180647':'SU38T','210392809':'SU4T','211372703':'SU28T ACR','210392825':'SU68T','210392803':'SU4T-H'};
const HSA_DECODE={'211638612':'S8_NY85','211638613':'S8_NY85','211638614':'S78_NY85','211638615':'S78_NY85','211638616':'S8_NY85','211638617':'S8_NY85','211638618':'S78_NY85','211638619':'S78_NY85','211638600':'S8_NY82','211638601':'S8_NY82','211638602':'S78_NY82','211638603':'S78_NY82','211638604':'S8_NY82','211638605':'S8_NY82','211638606':'S78_NY82','211638607':'S78_NY82','208427067':'S78_NY80','208427068':'S78_NY80','208427069':'S78_NY75','208427070':'S78_NY75','208427071':'S78_NY75','208427072':'S78_NY80','208427051':'PureS8 NY75','211638626':'S78_602G-X1','211638627':'S78_602G-X1','208427050':'S8_NY75','208427006':'S34_SMR','208427007':'S34_SMR','208427078':'S4+1xS2'};
const FIELDS={none:{label:'None',aliases:[]},cms:{label:'CMS_CONFIG',aliases:['CMS_CONFIG','DRIVE_DIM_CMS_CONFIG']},media:{label:'MEDIA_PART_NUM',aliases:['MEDIA_PART_NUM','DRIVE_DIM_MEDIA_PART_NUM','DRIVE_DIM_MEDIA_PART_NU_2']},hsa:{label:'HSA_PART_NUM',aliases:['HSA_PART_NUM','DRIVE_DIM_HSA_PART_NUM']},preamp:{label:'PRE_AMP_VENDOR',aliases:['PRE_AMP_VENDOR','DEF_PRE_AMP_VENDOR']},fsa:{label:'FSA_SUPPLIER_0',aliases:['FSA_SUPPLIER_0','DRIVE_DIM_FSA_SUPPLIER_0']},drivePart:{label:'DRIVE_PART_NUM',aliases:['DRIVE_PART_NUM','DEF_DRIVE_PART_NUM']},run:{label:'RUN_TYPE',aliases:['RUN_TYPE','DEF_RUN_TYPE','BUILD_GROUP']},mediaType:{label:'MEDIA_TYPE',aliases:['MEDIA_TYPE']},mdw:{label:'MDW_ID',aliases:['MDW_ID']},hsaVendor:{label:'HSA_VENDOR',aliases:['HSA_VENDOR']}};
const CORE={product:['PRODUCT','PRDCT_PRODUCT_DETAILED_NAME'],drive:['DRIVE_SERIAL_NUM','DRIVE_DIM_DRIVE_SERIAL_NUM'],sbr:['DRIVE_SBR_NUM','DEF_DRIVE_SBR_NUM'],fail:['FAIL_CODE','FAIL_DTL_FAIL_CODE'],op:['OPERATION','DEF_OPERATION'],date:['EVENT_DATE','DEF_ETL_LOAD_DATE','EVT_DT_ACTUAL_DATE']};
let rows=[],head=[],idx={},scanned=0;const el=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function buildIndex(){let a={...CORE};Object.entries(FIELDS).forEach(([k,v])=>{if(k!=='none')a[k]=v.aliases});for(const k in a){idx[k]=-1;for(const n of a[k]){let i=head.findIndex(h=>String(h).trim().toUpperCase()===n);if(i>=0){idx[k]=i;break}}}}
function raw(r,k){return idx[k]>=0?String(r[idx[k]]??'').trim():''}function norm(x){let s=String(x??'').trim();return /^\d+\.0+$/.test(s)?s.replace(/\.0+$/,''):s}function week(s){let m=String(s).toUpperCase().match(/^SM(\d{2})/);return m?m[1]:'Unknown'}function isPass(x){return['','N/A','NA','NONE'].includes(String(x).trim().toUpperCase())}function stamp(x){let d=new Date(x);return isNaN(d)?0:+d}function decoded(k,v){let s=norm(v);if(k==='hsa')return HSA_DECODE[s]||s;if(k==='media')return MEDIA_DECODE[s]||s;return s||'Blank'}
function make(r,i){let o={product:raw(r,'product')||'Blank',drive:raw(r,'drive')||'ROW'+i,week:week(raw(r,'sbr')),op:raw(r,'op')||'Blank',fail:raw(r,'fail'),date:raw(r,'date')};for(const k in FIELDS)if(k!=='none')o[k]=norm(raw(r,k))||'Blank';return o}
function csvLine(l){let a=[],x='',q=false;for(let i=0;i<l.length;i++){let c=l[i],n=l[i+1];if(q){if(c==='"'&&n==='"'){x+='"';i++}else if(c==='"')q=false;else x+=c}else if(c==='"')q=true;else if(c===','){a.push(x);x=''}else x+=c}a.push(x);return a}
async function loadFile(f){if(!f)return;rows=[];scanned=0;if(/\.xlsx?$/i.test(f.name)){if(!window.XLSX){showWarn('XLSX library โหลดไม่ได้ กรุณาใช้ CSV');return}let b=await f.arrayBuffer(),wb=XLSX.read(b,{type:'array'}),a=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});head=a.shift().map(String);buildIndex();scanned=a.length;rows=dedupe(a.map(make));finish(f)}else readCSV(f)}
function readCSV(f){let size=4e6,off=0,rest='',first=true,a=[],rd=new FileReader();function next(){rd.onload=e=>{off+=size;let lines=(rest+e.target.result).split(/\r?\n/);rest=off>=f.size?'':lines.pop();for(const l of lines){if(!l)continue;let r=csvLine(l);if(first){head=r;buildIndex();first=false}else{scanned++;a.push(make(r,scanned))}}el('bar').style.width=Math.min(100,off/f.size*100)+'%';el('prog').textContent='Rows '+scanned.toLocaleString();off<f.size?next():(rows=dedupe(a),finish(f))};rd.readAsText(f.slice(off,off+size))}next()}
function dedupe(a){let m=new Map();for(const r of a){let k=r.drive+'|'+r.week+'|'+r.op,o=m.get(k);if(!o||stamp(r.date)>stamp(o.date))m.set(k,r)}return[...m.values()]}
function finish(f){el('bar').style.width='100%';el('info').classList.remove('hide');el('info').innerHTML='<b>Loaded:</b> '+esc(f.name)+' | Rows '+scanned.toLocaleString()+' | Analysis '+rows.length.toLocaleString();let miss=[];if(idx.sbr<0)miss.push('DRIVE_SBR_NUM');if(idx.op<0)miss.push('OPERATION');if(idx.fail<0)miss.push('FAIL_CODE');if(miss.length)showWarn('Missing: '+miss.join(', '));fill();render()}
function showWarn(s){el('warn').classList.remove('hide');el('warn').textContent=s}function rank(x){let i=ORDER.indexOf(x);return i<0?999:i}function opSort(a,b){return rank(a)-rank(b)||a.localeCompare(b)}
function fill(){let ps=[...new Set(rows.map(r=>r.product))].sort(),os=[...new Set(rows.map(r=>r.op))].sort(opSort);el('product').innerHTML='<option value="all">All</option>'+ps.map(x=>'<option>'+esc(x)+'</option>').join('');el('ops').innerHTML=os.map(x=>`<label><input class="op" type="checkbox" value="${esc(x)}" ${x.startsWith('*')?'':'checked'} onchange="render()">${esc(x)}</label>`).join('');let opts=Object.entries(FIELDS).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('');['lv1','lv2','lv3','lv4'].forEach(id=>el(id).innerHTML=opts);el('lv1').value='cms';el('lv2').value='hsa';el('lv3').value='media';el('lv4').value='none'}
function pick(mode){document.querySelectorAll('.op').forEach(c=>c.checked=mode==='all'||(mode==='normal'&&!c.value.startsWith('*'))||(mode==='star'&&c.value.startsWith('*')));render()}function chosenOps(){return[...document.querySelectorAll('.op:checked')].map(x=>x.value).sort(opSort)}function stats(a){let p=a.filter(r=>isPass(r.fail)).length,d=a.length;return{p,d,y:d?p/d*100:null}}function qty(x){return x?x.toLocaleString():'---'}function pct(x){return x==null?'---':x.toFixed(1)}function setTheme(v){document.body.dataset.theme=v;localStorage.setItem('yieldTheme',v)}
function render(){let selected=chosenOps(),levels=['lv1','lv2','lv3','lv4'].map(id=>el(id).value).filter(x=>x!=='none'),base=rows.filter(r=>(el('product').value==='all'||r.product===el('product').value)&&selected.includes(r.op)),weeks=[...new Set(base.map(r=>r.week))].sort(),groups=[];
for(const w of weeks){let wr=base.filter(r=>r.week===w),map=new Map();for(const r of wr){let values=levels.map(k=>decoded(k,r[k]));let key=values.join('\u001f');if(!map.has(key))map.set(key,{week:w,values,rows:[]});map.get(key).rows.push(r)}groups.push(...map.values())}
el('path').textContent='WW → '+levels.map(k=>FIELDS[k].label).join(' → ')+' | Group key ใช้ค่า Decode';if(!groups.length){el('matrix').innerHTML='<tr><td>ไม่พบข้อมูล หรือยังไม่ได้เลือก Operation</td></tr>';return}
let h='',spans=[{name:'WW',get:g=>'WW'+g.week},...levels.map((k,i)=>({name:FIELDS[k].label,get:g=>g.values[i]}))];for(let si=0;si<spans.length;si++){let s=spans[si],cells=[],i=0;while(i<groups.length){let value=s.get(groups[i]),n=1;while(i+n<groups.length&&s.get(groups[i+n])===value&&spans.slice(0,si).every(p=>p.get(groups[i+n])===p.get(groups[i])))n++;cells.push(`<th colspan="${n*2}">${esc(value)}</th>`);i+=n}h+=`<tr class="level"><th class="left">${esc(s.name)}</th>${cells.join('')}</tr>`}h+='<tr><th class="left">OPERATION</th>'+groups.map(()=>'<th>QTY</th><th>%</th>').join('')+'</tr>';
let b='',cum=groups.map(()=>1);for(const op of selected){let cells=groups.map((gr,i)=>{let s=stats(gr.rows.filter(r=>r.op===op));if(s.y!=null)cum[i]*=s.y/100;return`<td>${qty(s.d)}</td><td class="${s.y!=null&&s.y<+el('target').value?'low':''}">${pct(s.y)}</td>`}).join('');b+=`<tr class="sum"><td class="left"><b>${esc(op)}</b></td>${cells}</tr>`}let last=selected.at(-1);b+=`<tr class="cum"><td class="left">CUM YIELD</td>${groups.map((gr,i)=>{let s=stats(gr.rows.filter(r=>r.op===last));return`<td>${qty(s.p)}</td><td>${pct(cum[i]*100)}</td>`}).join('')}</tr>`;el('matrix').innerHTML=h+b}
function exportCSV(){let x=[...el('matrix').rows].map(r=>[...r.cells].map(c=>'"'+c.innerText.replaceAll('"','""')+'"').join(',')).join('\n'),a=document.createElement('a');a.href=URL.createObjectURL(new Blob([x],{type:'text/csv'}));a.download='multilevel_yield_v4_8_3.csv';a.click()}
const saved=localStorage.getItem('yieldTheme')||'ocean';document.body.dataset.theme=saved;window.addEventListener('DOMContentLoaded',()=>{if(el('theme'))el('theme').value=saved});
</script></body></html>
