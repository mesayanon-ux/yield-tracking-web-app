<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Yield Analysis V4.7</title><script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script><style>
*{box-sizing:border-box}body{margin:0;font-family:Arial;background:#f8fafc;color:#0f172a}.w{max-width:1600px;margin:auto;padding:22px}.card{background:#fff;border-radius:16px;padding:16px;margin:14px 0;box-shadow:0 8px 22px #0f172a14}.tag{display:inline-block;background:#dbeafe;color:#1d4ed8;padding:7px 12px;border-radius:20px;font-weight:700}.top,.actions{display:flex;justify-content:space-between;gap:10px;align-items:end;flex-wrap:wrap}.drop{text-align:center;background:#eff6ff;border:2px dashed #93c5fd;border-radius:15px;padding:18px}.filters{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}input,select,button{padding:9px;border:1px solid #cbd5e1;border-radius:10px;background:#fff}button{background:#2563eb;color:#fff;font-weight:700;cursor:pointer}.ghost{background:#fff;color:#2563eb}.opbox{margin-top:12px;border:1px solid #cbd5e1;border-radius:12px;padding:12px}.ops{display:flex;gap:8px 15px;flex-wrap:wrap;margin-top:9px}.ops label{display:flex;gap:5px;align-items:center;font-weight:600}.ops input{width:auto}.muted{font-size:13px;color:#64748b}.ok{background:#ecfdf5;color:#166534;padding:10px;border-radius:10px;margin-top:10px}.warn{background:#fff7ed;color:#9a3412;padding:10px;border-radius:10px;margin-top:10px}.hide{display:none}.progress{height:11px;background:#e2e8f0;border-radius:10px;overflow:hidden;margin-top:10px}.bar{height:100%;width:0;background:#2563eb}.scroll{overflow:auto;max-height:72vh;border:1px solid #111}table{border-collapse:collapse;min-width:1300px;width:100%;font-size:12px}th,td{border:1px solid #111;padding:4px 6px;text-align:right;white-space:nowrap}th{background:#2f6dcc;color:#fff;text-align:center;position:sticky;top:0}.left{text-align:left}.sum td{background:#e6e6e6}.cum td{background:#4f84d8;color:#fff;font-weight:700}.detail td{background:#b9ff9b;font-weight:700}.spacer td{height:13px;background:#f8fafc;border:0}@media(max-width:950px){.filters{grid-template-columns:1fr 1fr}}
</style></head><body><div class="w"><div class="top"><div><span class="tag">V4.7 Media Part Decode</span><h1>Yield Analysis Web App</h1><div class="muted">WW จาก DRIVE_SBR_NUM และ Attribute Pivot แบบ QTY / %</div></div><button onclick="location.reload()">Reset</button></div>
<div class="card"><div class="drop"><h2>Upload CSV / XLSX</h2><input type="file" accept=".csv,.xlsx,.xls" onchange="loadFile(this.files[0])"><div class="progress"><div id="bar" class="bar"></div></div><div id="prog" class="muted">Waiting...</div></div><div id="info" class="ok hide"></div><div id="warn" class="warn hide"></div></div>
<div class="card"><div class="filters"><label>Product<select id="product" onchange="render()"><option value="all">All</option></select></label><label>Attribute<select id="attribute" onchange="render()"><option value="media">MEDIA_PART_NUM</option><option value="hsa">HSA_PART_NUM</option><option value="preamp">PRE_AMP_VENDOR</option><option value="fsa">FSA_SUPPLIER_0</option><option value="drivePart">DRIVE_PART_NUM</option><option value="run">RUN_TYPE</option></select></label><label>Fail Detail Limit<input id="limit" type="number" value="15" min="1" max="100" oninput="render()"></label><label>Count Mode<select id="mode"><option value="unique">Unique Drive / WW / Operation</option><option value="event">Event rows</option></select></label></div><div class="opbox"><div class="actions"><b>Operation</b><div><button class="ghost" onclick="pick('normal')">Oper ปกติ</button> <button class="ghost" onclick="pick('star')">*Oper</button> <button class="ghost" onclick="pick('all')">ทั้งหมด</button> <button class="ghost" onclick="pick('none')">ล้าง</button></div></div><div id="ops" class="ops"></div></div></div>
<div class="card"><div class="actions"><div><h2 id="title">Yield by MEDIA_PART_NUM</h2><div class="muted">รหัส Media Part จะแสดงพร้อมชื่อ Decode เช่น 210392803 — SU4T-H</div></div><button onclick="exportCSV()">Export CSV</button></div><div class="scroll"><table id="matrix"></table></div></div></div>
<script>
const ORDER=['SCOPY','PRE2','*PRE2','CAL','*CAL','CAL2','*CAL2','FNC2','*FNC2','SPSC2','*SPSC2','CRT2','*CRT2','PWT','*PWT'];
const DECODE={'208956103':'SU2T','208956203':'SU28T','207373222':'SU3T','209130011':'SU3T_H','202180647':'SU38T','210392809':'SU4T','211372703':'SU28T ACR','210392825':'SU68T','210392803':'SU4T-H'};
const A={product:['PRODUCT','PRDCT_PRODUCT_DETAILED_NAME'],drive:['DRIVE_SERIAL_NUM','DRIVE_DIM_DRIVE_SERIAL_NUM'],sbr:['DRIVE_SBR_NUM','DEF_DRIVE_SBR_NUM'],fail:['FAIL_CODE','FAIL_DTL_FAIL_CODE'],op:['OPERATION','DEF_OPERATION'],date:['EVENT_DATE','DEF_ETL_LOAD_DATE','EVT_DT_ACTUAL_DATE'],run:['RUN_TYPE','DEF_RUN_TYPE','BUILD_GROUP'],media:['MEDIA_PART_NUM','DRIVE_DIM_MEDIA_PART_NUM','DRIVE_DIM_MEDIA_PART_NU_2'],hsa:['HSA_PART_NUM','DRIVE_DIM_HSA_PART_NUM'],preamp:['PRE_AMP_VENDOR','DEF_PRE_AMP_VENDOR'],fsa:['FSA_SUPPLIER_0','DRIVE_DIM_FSA_SUPPLIER_0'],drivePart:['DRIVE_PART_NUM','DEF_DRIVE_PART_NUM']};
let rows=[],head=[],ix={},scanned=0;const g=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function index(){for(let k in A){ix[k]=-1;for(let n of A[k]){let i=head.findIndex(h=>String(h).trim().toUpperCase()===n);if(i>=0){ix[k]=i;break}}}}function val(r,k){return ix[k]>=0?String(r[ix[k]]??'').trim():''}function ww(s){let m=String(s).toUpperCase().match(/^SM(\d{2})/);return m?m[1]:'Unknown'}function pass(x){return['','N/A','NA','NONE'].includes(String(x).trim().toUpperCase())}function tm(s){let d=new Date(s);return isNaN(d)?0:+d}function norm(x){let s=String(x??'').trim();return /^\d+\.0+$/.test(s)?s.replace(/\.0+$/,''):s}function display(k,x){let s=norm(x);return k==='media'&&DECODE[s]?s+' — '+DECODE[s]:s}
function item(r,i){let s=val(r,'sbr');return{product:val(r,'product')||'Blank',drive:val(r,'drive')||'ROW'+i,week:ww(s),op:val(r,'op')||'Blank',fail:val(r,'fail'),date:val(r,'date'),run:val(r,'run')||'Blank',media:norm(val(r,'media'))||'Blank',hsa:norm(val(r,'hsa'))||'Blank',preamp:val(r,'preamp')||'Blank',fsa:val(r,'fsa')||'Blank',drivePart:val(r,'drivePart')||'Blank'}}
function csvLine(line){let a=[],x='',q=false;for(let i=0;i<line.length;i++){let c=line[i],n=line[i+1];if(q){if(c==='"'&&n==='"'){x+='"';i++}else if(c==='"')q=false;else x+=c}else if(c==='"')q=true;else if(c===','){a.push(x);x=''}else x+=c}a.push(x);return a}
async function loadFile(f){if(!f)return;rows=[];scanned=0;g('prog').textContent='Reading '+f.name;if(/\.xlsx?$/i.test(f.name)){if(!window.XLSX){warn('XLSX library unavailable; use CSV');return}let b=await f.arrayBuffer(),wb=XLSX.read(b,{type:'array'}),ar=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});head=ar.shift().map(String);index();scanned=ar.length;rows=dedupe(ar.map(item));finish(f)}else readCSV(f)}
function readCSV(f){let size=4*1024*1024,off=0,rest='',first=true,all=[],rd=new FileReader();function next(){rd.onload=e=>{off+=size;let ls=(rest+e.target.result).split(/\r?\n/);rest=off>=f.size?'':ls.pop();for(let l of ls){if(!l)continue;let r=csvLine(l);if(first){head=r;index();first=false}else{scanned++;all.push(item(r,scanned))}}g('bar').style.width=Math.min(100,off/f.size*100)+'%';g('prog').textContent='Rows '+scanned.toLocaleString();off<f.size?next():(rows=dedupe(all),finish(f))};rd.readAsText(f.slice(off,off+size))}next()}
function dedupe(a){if(g('mode').value==='event')return a;let m=new Map();for(let r of a){let k=r.drive+'|'+r.week+'|'+r.op,o=m.get(k);if(!o||tm(r.date)>tm(o.date))m.set(k,r)}return[...m.values()]}
function warn(x){g('warn').classList.remove('hide');g('warn').textContent=x}function finish(f){g('bar').style.width='100%';g('info').classList.remove('hide');g('info').innerHTML='<b>Loaded:</b> '+esc(f.name)+' | Rows '+scanned.toLocaleString()+' | Analysis '+rows.length.toLocaleString();let miss=[];if(ix.sbr<0)miss.push('DRIVE_SBR_NUM');if(ix.fail<0)miss.push('FAIL_CODE');if(ix.op<0)miss.push('OPERATION');if(miss.length)warn('Missing: '+miss.join(', '));fill();render()}
function rank(x){let i=ORDER.indexOf(x);return i<0?999:i}function sortOp(a,b){return rank(a)-rank(b)||a.localeCompare(b)}function fill(){let ps=[...new Set(rows.map(r=>r.product))].sort(),os=[...new Set(rows.map(r=>r.op))].sort(sortOp);g('product').innerHTML='<option value="all">All</option>'+ps.map(x=>'<option>'+esc(x)+'</option>').join('');g('ops').innerHTML=os.map(x=>`<label><input class="op" type="checkbox" value="${esc(x)}" ${x.startsWith('*')?'':'checked'} onchange="render()">${esc(x)}</label>`).join('')}function pick(k){document.querySelectorAll('.op').forEach(c=>c.checked=k==='all'||(k==='normal'&&!c.value.startsWith('*'))||(k==='star'&&c.value.startsWith('*')));render()}function chosen(){return[...document.querySelectorAll('.op:checked')].map(x=>x.value).sort(sortOp)}
function stat(a){let p=a.filter(r=>pass(r.fail)).length,d=a.length;return{p,d,y:d?p/d*100:null}}function fq(x){return x?x.toLocaleString():'---'}function fp(x){return x==null?'---':x.toFixed(2)}
function render(){let key=g('attribute').value,ops=chosen(),base=rows.filter(r=>(g('product').value==='all'||r.product===g('product').value)&&ops.includes(r.op)),weeks=[...new Set(base.map(r=>r.week))].sort(),attrs=[...new Set(base.map(r=>r[key]||'Blank'))].sort((a,b)=>String(a).localeCompare(String(b),undefined,{numeric:true})),out='';g('title').textContent='Yield by '+g('attribute').selectedOptions[0].text;
for(let w of weeks){let wr=base.filter(r=>r.week===w),aa=attrs.filter(x=>wr.some(r=>(r[key]||'Blank')===x)),cum={};aa.forEach(x=>cum[x]=1);out+=`<tr><th>WW</th><th colspan="${aa.length*2}">WW${esc(w)}</th></tr><tr><th class="left">OPERATION / FAIL CODE</th>${aa.map(x=>`<th colspan="2">${esc(display(key,x))}</th>`).join('')}</tr><tr><th></th>${aa.map(()=>'<th>QTY</th><th>%</th>').join('')}</tr>`;for(let op of ops){let cells=aa.map(x=>{let s=stat(wr.filter(r=>r.op===op&&(r[key]||'Blank')===x));if(s.y!=null)cum[x]*=s.y/100;return`<td>${fq(s.d)}</td><td>${fp(s.y)}</td>`}).join('');out+=`<tr class="sum"><td class="left"><b>${esc(op)}</b></td>${cells}</tr>`}let last=ops.at(-1);out+=`<tr class="cum"><td class="left">CUM YIELD</td>${aa.map(x=>{let s=stat(wr.filter(r=>r.op===last&&(r[key]||'Blank')===x));return`<td>${fq(s.p)}</td><td>${fp(cum[x]*100)}</td>`}).join('')}</tr>`;for(let op of ops){let or=wr.filter(r=>r.op===op),codes=[...new Set(or.filter(r=>!pass(r.fail)).map(r=>r.fail||'Blank'))].map(c=>({c,q:or.filter(r=>(r.fail||'Blank')===c).length})).sort((a,b)=>b.q-a.q).slice(0,+g('limit').value);if(!codes.length)continue;out+=`<tr class="detail"><td class="left">${esc(op)} — FAIL DETAIL</td>${aa.map(()=>'<td>---</td><td>---</td>').join('')}</tr>`;for(let d of codes)out+=`<tr><td class="left">${esc(d.c)}</td>${aa.map(x=>{let p=or.filter(r=>(r[key]||'Blank')===x),q=p.filter(r=>(r.fail||'Blank')===d.c).length;return`<td>${fq(q)}</td><td>${fp(p.length?q/p.length*100:null)}</td>`}).join('')}</tr>`}out+='<tr class="spacer"><td colspan="999"></td></tr>'}g('matrix').innerHTML=out||'<tr><td>กรุณาเลือก Operation หรือ Upload file</td></tr>'}
function exportCSV(){let x=[...g('matrix').rows].map(r=>[...r.cells].map(c=>'"'+c.innerText.replaceAll('"','""')+'"').join(',')).join('\n'),a=document.createElement('a');a.href=URL.createObjectURL(new Blob([x],{type:'text/csv'}));a.download='attribute_pivot_v4_7.csv';a.click()}
</script></body></html>
