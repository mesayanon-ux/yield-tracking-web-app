<!doctype html><html lang="th"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Yield Analysis V4.8.1</title><script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script><style>
*{box-sizing:border-box}body{margin:0;font-family:Arial;background:#f8fafc;color:#0f172a}.w{max-width:1700px;margin:auto;padding:20px}.card{background:#fff;border-radius:16px;padding:15px;margin:13px 0;box-shadow:0 8px 22px #0f172a14}.top,.actions{display:flex;justify-content:space-between;gap:10px;align-items:end;flex-wrap:wrap}.tag{background:#dbeafe;color:#1d4ed8;padding:7px 12px;border-radius:20px;font-weight:700}h1{margin:8px 0}.drop{text-align:center;padding:17px;border:2px dashed #93c5fd;background:#eff6ff;border-radius:14px}.filters{display:grid;grid-template-columns:repeat(6,1fr);gap:9px}input,select,button{padding:9px;border:1px solid #cbd5e1;border-radius:10px;background:#fff}button{background:#2563eb;color:#fff;font-weight:700;cursor:pointer}.ghost{background:#fff;color:#2563eb}.ops{display:flex;gap:8px 14px;flex-wrap:wrap;margin-top:9px}.ops label{display:flex;align-items:center;gap:5px;font-weight:600}.ops input{width:auto}.opbox{border:1px solid #cbd5e1;border-radius:12px;padding:11px;margin-top:11px}.muted{font-size:13px;color:#64748b}.info{background:#ecfdf5;color:#166534;padding:9px;border-radius:10px;margin-top:9px}.hide{display:none}.progress{height:10px;background:#e2e8f0;border-radius:9px;overflow:hidden;margin-top:9px}.bar{height:100%;background:#2563eb;width:0}.scroll{overflow:auto;max-height:75vh;border:1px solid #111}table{border-collapse:collapse;min-width:1400px;width:100%;font-size:12px}th,td{border:1px solid #111;padding:4px 6px;text-align:right;white-space:nowrap}th{background:#0d2e49;color:#fff;text-align:center}.left{text-align:left}.sum td{background:#fff}.cum td{background:#fff8b8;font-weight:700}.detail td{background:#e5e7eb;font-weight:700}.low{background:#fff600!important}.spacer td{height:12px;border:0;background:#f8fafc}@media(max-width:1050px){.filters{grid-template-columns:1fr 1fr}}
</style></head><body><div class="w"><div class="top"><div><span class="tag">V4.8.1 Full HSA Decode</span><h1>Yield Analysis Web App</h1><div class="muted">WW → Multi-Level Attribute พร้อม Decode MEDIA_PART_NUM และ HSA_PART_NUM</div></div><button onclick="location.reload()">Reset</button></div>
<div class="card"><div class="drop"><h2>Upload CSV / XLSX</h2><input type="file" accept=".csv,.xlsx,.xls" onchange="loadFile(this.files[0])"><div class="progress"><div id="bar" class="bar"></div></div><div id="prog" class="muted">Waiting...</div></div><div id="info" class="info hide"></div></div>
<div class="card"><div class="filters"><label>Product<select id="product" onchange="render()"><option value="all">All</option></select></label><label>ชั้นที่ 1<select id="lv1" onchange="render()"></select></label><label>ชั้นที่ 2<select id="lv2" onchange="render()"></select></label><label>ชั้นที่ 3<select id="lv3" onchange="render()"></select></label><label>ชั้นที่ 4<select id="lv4" onchange="render()"></select></label><label>Highlight ต่ำกว่า %<input id="target" type="number" value="98.5" step=".1" oninput="render()"></label></div><div class="opbox"><div class="actions"><b>Operation</b><div><button class="ghost" onclick="pick('normal')">Oper ปกติ</button> <button class="ghost" onclick="pick('star')">*Oper</button> <button class="ghost" onclick="pick('all')">ทั้งหมด</button> <button class="ghost" onclick="pick('none')">ล้าง</button></div></div><div id="ops" class="ops"></div></div><p class="muted">เลือก None ในชั้นที่ไม่ต้องการได้ · ระบบรวมคอลัมน์อัตโนมัติตามค่าที่ซ้ำในแต่ละชั้น</p></div>
<div class="card"><div class="actions"><div><h2>Multi-Level Yield Pivot</h2><div id="path" class="muted"></div></div><button onclick="exportCSV()">Export CSV</button></div><div class="scroll"><table id="matrix"></table></div></div></div>
<script>
const ORDER=['SCOPY','PRE2','*PRE2','CAL','*CAL','CAL2','*CAL2','FNC2','*FNC2','SPSC2','*SPSC2','CRT2','*CRT2','PWT','*PWT'];
const MEDIA_DECODE={'208956103':'SU2T','208956203':'SU28T','207373222':'SU3T','209130011':'SU3T_H','202180647':'SU38T','210392809':'SU4T','211372703':'SU28T ACR','210392825':'SU68T','210392803':'SU4T-H'};
const HSA_DECODE={'211638612':'S8_NY85','211638613':'S8_NY85','211638614':'S78_NY85','211638615':'S78_NY85','211638616':'S8_NY85','211638617':'S8_NY85','211638618':'S78_NY85','211638619':'S78_NY85','211638600':'S8_NY82','211638601':'S8_NY82','211638602':'S78_NY82','211638603':'S78_NY82','211638604':'S8_NY82','211638605':'S8_NY82','211638606':'S78_NY82','211638607':'S78_NY82','208427067':'S78_NY80','208427068':'S78_NY80','208427069':'S78_NY75','208427070':'S78_NY75','208427071':'S78_NY75','208427072':'S78_NY80','208427051':'PureS8 NY75','211638626':'S78_602G-X1','211638627':'S78_602G-X1','208427050':'S8_NY75','208427006':'S34_SMR','208427007':'S34_SMR','208427078':'S4+1xS2'};
const FIELDS={none:{label:'None',a:[]},cms:{label:'CMS_CONFIG',a:['CMS_CONFIG','DRIVE_DIM_CMS_CONFIG']},media:{label:'MEDIA_PART_NUM',a:['MEDIA_PART_NUM','DRIVE_DIM_MEDIA_PART_NUM','DRIVE_DIM_MEDIA_PART_NU_2']},hsa:{label:'HSA_PART_NUM',a:['HSA_PART_NUM','DRIVE_DIM_HSA_PART_NUM']},preamp:{label:'PRE_AMP_VENDOR',a:['PRE_AMP_VENDOR','DEF_PRE_AMP_VENDOR']},fsa:{label:'FSA_SUPPLIER_0',a:['FSA_SUPPLIER_0','DRIVE_DIM_FSA_SUPPLIER_0']},drivePart:{label:'DRIVE_PART_NUM',a:['DRIVE_PART_NUM','DEF_DRIVE_PART_NUM']},run:{label:'RUN_TYPE',a:['RUN_TYPE','DEF_RUN_TYPE','BUILD_GROUP']},mediaType:{label:'MEDIA_TYPE',a:['MEDIA_TYPE']},mdw:{label:'MDW_ID',a:['MDW_ID']},hsaVendor:{label:'HSA_VENDOR',a:['HSA_VENDOR']}};
const CORE={product:['PRODUCT','PRDCT_PRODUCT_DETAILED_NAME'],drive:['DRIVE_SERIAL_NUM','DRIVE_DIM_DRIVE_SERIAL_NUM'],sbr:['DRIVE_SBR_NUM','DEF_DRIVE_SBR_NUM'],fail:['FAIL_CODE','FAIL_DTL_FAIL_CODE'],op:['OPERATION','DEF_OPERATION'],date:['EVENT_DATE','DEF_ETL_LOAD_DATE','EVT_DT_ACTUAL_DATE']};
let rows=[],head=[],ix={},scan=0;const g=id=>document.getElementById(id),esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function indexes(){let all={...CORE};for(let k in FIELDS)if(k!=='none')all[k]=FIELDS[k].a;for(let k in all){ix[k]=-1;for(let n of all[k]){let i=head.findIndex(h=>String(h).trim().toUpperCase()===n);if(i>=0){ix[k]=i;break}}}}function v(r,k){return ix[k]>=0?String(r[ix[k]]??'').trim():''}function norm(x){let s=String(x??'').trim();return /^\d+\.0+$/.test(s)?s.replace(/\.0+$/,''):s}function ww(s){let m=String(s).toUpperCase().match(/^SM(\d{2})/);return m?m[1]:'Unknown'}function pass(x){return['','N/A','NA','NONE'].includes(String(x).trim().toUpperCase())}function tm(x){let d=new Date(x);return isNaN(d)?0:+d}
function item(r,i){let s=v(r,'sbr'),o={product:v(r,'product')||'Blank',drive:v(r,'drive')||'ROW'+i,week:ww(s),op:v(r,'op')||'Blank',fail:v(r,'fail'),date:v(r,'date')};for(let k in FIELDS)if(k!=='none')o[k]=norm(v(r,k))||'Blank';return o}function csvLine(l){let a=[],x='',q=false;for(let i=0;i<l.length;i++){let c=l[i],n=l[i+1];if(q){if(c==='"'&&n==='"'){x+='"';i++}else if(c==='"')q=false;else x+=c}else if(c==='"')q=true;else if(c===','){a.push(x);x=''}else x+=c}a.push(x);return a}
async function loadFile(f){if(!f)return;rows=[];scan=0;if(/\.xlsx?$/i.test(f.name)){let b=await f.arrayBuffer(),wb=XLSX.read(b,{type:'array'}),a=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});head=a.shift().map(String);indexes();scan=a.length;rows=dedupe(a.map(item));finish(f)}else readCSV(f)}function readCSV(f){let size=4e6,off=0,rest='',first=true,a=[],rd=new FileReader();function next(){rd.onload=e=>{off+=size;let ls=(rest+e.target.result).split(/\r?\n/);rest=off>=f.size?'':ls.pop();for(let l of ls){if(!l)continue;let r=csvLine(l);if(first){head=r;indexes();first=false}else{scan++;a.push(item(r,scan))}}g('bar').style.width=Math.min(100,off/f.size*100)+'%';g('prog').textContent='Rows '+scan.toLocaleString();off<f.size?next():(rows=dedupe(a),finish(f))};rd.readAsText(f.slice(off,off+size))}next()}function dedupe(a){let m=new Map();for(let r of a){let k=r.drive+'|'+r.week+'|'+r.op,o=m.get(k);if(!o||tm(r.date)>tm(o.date))m.set(k,r)}return[...m.values()]}
function finish(f){g('bar').style.width='100%';g('info').classList.remove('hide');g('info').innerHTML='<b>Loaded:</b> '+esc(f.name)+' | Rows '+scan.toLocaleString()+' | Analysis '+rows.length.toLocaleString();fill();render()}function rank(x){let i=ORDER.indexOf(x);return i<0?999:i}function sortOp(a,b){return rank(a)-rank(b)||a.localeCompare(b)}
function fill(){let ps=[...new Set(rows.map(r=>r.product))].sort(),os=[...new Set(rows.map(r=>r.op))].sort(sortOp);g('product').innerHTML='<option value="all">All</option>'+ps.map(x=>'<option>'+esc(x)+'</option>').join('');g('ops').innerHTML=os.map(x=>`<label><input class="op" type="checkbox" value="${esc(x)}" ${x.startsWith('*')?'':'checked'} onchange="render()">${esc(x)}</label>`).join('');let opts=Object.entries(FIELDS).map(([k,f])=>`<option value="${k}">${f.label}</option>`).join('');['lv1','lv2','lv3','lv4'].forEach(id=>g(id).innerHTML=opts);g('lv1').value='cms';g('lv2').value='hsa';g('lv3').value='media';g('lv4').value='none'}function pick(k){document.querySelectorAll('.op').forEach(c=>c.checked=k==='all'||(k==='normal'&&!c.value.startsWith('*'))||(k==='star'&&c.value.startsWith('*')));render()}function ops(){return[...document.querySelectorAll('.op:checked')].map(x=>x.value).sort(sortOp)}function st(a){let p=a.filter(r=>pass(r.fail)).length,d=a.length;return{p,d,y:d?p/d*100:null}}function fq(x){return x?x.toLocaleString():'---'}function fp(x){return x==null?'---':x.toFixed(1)}function show(k,x){let s=norm(x);if(k==='media'&&MEDIA_DECODE[s])return MEDIA_DECODE[s]+'\n'+s;if(k==='hsa'&&HSA_DECODE[s])return HSA_DECODE[s]+'\n'+s;return s}
function render(){let selected=ops(),levels=['lv1','lv2','lv3','lv4'].map(id=>g(id).value).filter(x=>x!=='none'),base=rows.filter(r=>(g('product').value==='all'||r.product===g('product').value)&&selected.includes(r.op)),weeks=[...new Set(base.map(r=>r.week))].sort(),groups=[];for(let w of weeks){let wr=base.filter(r=>r.week===w),map=new Map();for(let r of wr){let vals=levels.map(k=>r[k]||'Blank'),key=vals.join('\u001f');if(!map.has(key))map.set(key,{week:w,vals,rows:[]});map.get(key).rows.push(r)}groups.push(...map.values())}g('path').textContent='WW → '+levels.map(k=>FIELDS[k].label).join(' → ');if(!groups.length){g('matrix').innerHTML='<tr><td>ไม่พบข้อมูล</td></tr>';return}let h='',spans=[{name:'WW',get:x=>'WW'+x.week},...levels.map((k,i)=>({name:FIELDS[k].label,get:x=>show(k,x.vals[i])}))];for(let si=0;si<spans.length;si++){let s=spans[si],c=[],i=0;while(i<groups.length){let val=s.get(groups[i]),n=1;while(i+n<groups.length&&s.get(groups[i+n])===val&&spans.slice(0,si).every(p=>p.get(groups[i+n])===p.get(groups[i])))n++;c.push(`<th colspan="${n*2}">${esc(val).replace(/\n/g,'<br>')}</th>`);i+=n}h+='<tr><th class="left">'+esc(s.name)+'</th>'+c.join('')+'</tr>'}h+='<tr><th class="left">OPERATION</th>'+groups.map(()=>'<th>QTY</th><th>%</th>').join('')+'</tr>';let b='',cum=groups.map(()=>1);for(let op of selected){let cells=groups.map((gr,i)=>{let z=gr.rows.filter(r=>r.op===op),s=st(z);if(s.y!=null)cum[i]*=s.y/100;return`<td>${fq(s.d)}</td><td class="${s.y!=null&&s.y<+g('target').value?'low':''}">${fp(s.y)}</td>`}).join('');b+=`<tr class="sum"><td class="left"><b>${esc(op)}</b></td>${cells}</tr>`}b+=`<tr class="cum"><td class="left">CUM YIELD</td>${groups.map((gr,i)=>{let z=gr.rows.filter(r=>r.op===selected.at(-1)),s=st(z);return`<td>${fq(s.p)}</td><td>${fp(cum[i]*100)}</td>`}).join('')}</tr>`;g('matrix').innerHTML=h+b}
function exportCSV(){let x=[...g('matrix').rows].map(r=>[...r.cells].map(c=>'"'+c.innerText.replaceAll('"','""')+'"').join(',')).join('\n'),a=document.createElement('a');a.href=URL.createObjectURL(new Blob([x],{type:'text/csv'}));a.download='multilevel_yield_v4_8_1.csv';a.click()}
</script></body></html>
